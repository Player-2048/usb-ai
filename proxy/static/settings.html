<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 — Personal AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .settings-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .settings-container h1 { font-size: 22px; margin-bottom: 24px; }
        .provider-group { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .provider-group h3 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .provider-group label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
        .provider-group input { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
        .provider-group input:focus { outline: none; border-color: #4f46e5; }
        .test-btn { padding: 4px 12px; font-size: 12px; border: 1px solid #4f46e5; background: #fff; color: #4f46e5; border-radius: 4px; cursor: pointer; }
        .test-btn:hover { background: #eef2ff; }
        .test-btn.success { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
        .test-btn.fail { border-color: #dc2626; color: #dc2626; background: #fef2f2; }
        .nav-link { display: inline-block; margin-top: 20px; font-size: 13px; color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="settings-container">
        <h1>⚙️ 设置</h1>
        <p style="color:#888;font-size:13px;margin-bottom:24px;">配置你的 AI 供应商 API Key。所有 Key 将加密存储在你的电脑上。</p>

        <div class="provider-group">
            <h3>🟢 DeepSeek</h3>
            <label>API Key</label>
            <input type="password" class="api-key-input" data-provider="deepseek" placeholder="sk-...">
            <button class="test-btn" data-provider="deepseek">测试连接</button>
        </div>

        <div class="provider-group">
            <h3>🟠 OpenAI（GPT）</h3>
            <label>API Key</label>
            <input type="password" class="api-key-input" data-provider="openai" placeholder="sk-...">
            <button class="test-btn" data-provider="openai">测试连接</button>
        </div>

        <div class="provider-group">
            <h3>🟣 Claude（Anthropic）</h3>
            <label>API Key</label>
            <input type="password" class="api-key-input" data-provider="claude" placeholder="sk-ant-...">
            <button class="test-btn" data-provider="claude">测试连接</button>
        </div>

        <div class="provider-group">
            <h3>🔵 Groq</h3>
            <label>API Key</label>
            <input type="password" class="api-key-input" data-provider="groq" placeholder="gsk_...">
            <button class="test-btn" data-provider="groq">测试连接</button>
        </div>

        <div class="provider-group" style="border: 2px dashed #4f46e5;">
            <h3>➕ 自定义供应商</h3>
            <label>名称（显示在下拉菜单里）</label>
            <input type="text" id="custom-name" placeholder="例如: moonshot, groq, zhipu">
            <label>API 地址</label>
            <input type="url" id="custom-endpoint" placeholder="https://api.example.com/v1/chat/completions">
            <label>模型名称</label>
            <input type="text" id="custom-model" placeholder="gpt-4, claude-3, qwen...">
            <label>API Key</label>
            <input type="password" id="custom-key" placeholder="sk-...">
            <button id="custom-add-btn" style="padding:6px 16px;background:#4f46e5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">添加到列表</button>
            <div id="custom-list" style="margin-top:12px;font-size:13px;"></div>
        </div>

        <a href="/" class="nav-link">← 返回聊天</a>
    </div>

    <script>
        const PROVIDER_MODELS = {
            deepseek: "deepseek-chat",
            openai: "gpt-4o-mini",
            claude: "claude-sonnet-4-6",
            groq: "llama-3.3-70b",
        };

        // Load saved keys
        document.querySelectorAll(".api-key-input").forEach(input => {
            const provider = input.dataset.provider;
            const saved = localStorage.getItem(`api_key_${provider}`);
            if (saved) input.value = saved;
        });

        // Custom provider management
        function renderCustomList() {
            const list = JSON.parse(localStorage.getItem("custom_providers") || "[]");
            const el = document.getElementById("custom-list");
            if (!list.length) {
                el.innerHTML = '<span style="color:#aaa;">还没有自定义供应商</span>';
                return;
            }
            el.innerHTML = list.map((p, i) =>
                `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;">
                    <span><strong>${escapeHTML(p.name)}</strong> / ${escapeHTML(p.model)}</span>
                    <button data-idx="${i}" class="custom-del-btn" style="color:#dc2626;border:none;background:none;cursor:pointer;font-size:12px;">删除</button>
                </div>`
            ).join("");
            el.querySelectorAll(".custom-del-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = parseInt(btn.dataset.idx);
                    const list2 = JSON.parse(localStorage.getItem("custom_providers") || "[]");
                    list2.splice(idx, 1);
                    localStorage.setItem("custom_providers", JSON.stringify(list2));
                    renderCustomList();
                });
            });
        }

        function escapeHTML(str) {
            const d = document.createElement("div");
            d.textContent = str;
            return d.innerHTML;
        }

        document.getElementById("custom-add-btn").addEventListener("click", () => {
            const name = document.getElementById("custom-name").value.trim();
            const endpoint = document.getElementById("custom-endpoint").value.trim();
            const model = document.getElementById("custom-model").value.trim();
            const key = document.getElementById("custom-key").value.trim();
            if (!name || !endpoint || !model) {
                alert("名称、API 地址和模型名称不能为空");
                return;
            }
            const list = JSON.parse(localStorage.getItem("custom_providers") || "[]");
            list.push({ name, endpoint, model, api_key: key });
            localStorage.setItem("custom_providers", JSON.stringify(list));
            document.getElementById("custom-name").value = "";
            document.getElementById("custom-endpoint").value = "";
            document.getElementById("custom-model").value = "";
            document.getElementById("custom-key").value = "";
            renderCustomList();
        });

        renderCustomList();

        // Test connection
        document.querySelectorAll(".test-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                const provider = btn.dataset.provider;
                const input = document.querySelector(`.api-key-input[data-provider="${provider}"]`);
                const key = input.value.trim();
                if (!key) { btn.textContent = "❌ 请输入 Key"; btn.className = "test-btn fail"; return; }

                localStorage.setItem(`api_key_${provider}`, key);
                btn.textContent = "⏳ 测试中...";
                btn.disabled = true;

                try {
                    const resp = await fetch("/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: PROVIDER_MODELS[provider],
                            messages: [{ role: "user", content: "Hello" }],
                        }),
                    });
                    if (resp.ok) {
                        btn.textContent = "✅ 连接成功";
                        btn.className = "test-btn success";
                    } else {
                        btn.textContent = `❌ 失败 (${resp.status})`;
                        btn.className = "test-btn fail";
                    }
                } catch (err) {
                    btn.textContent = "❌ 无法连接";
                    btn.className = "test-btn fail";
                }
                btn.disabled = false;
                setTimeout(() => { btn.textContent = "测试连接"; btn.className = "test-btn"; }, 3000);
            });
        });
    </script>
</body>
</html>
